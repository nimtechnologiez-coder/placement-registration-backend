services:
  - type: web
    name: placement-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: placement-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: UPLOAD_PATH
        value: /opt/render/project/src/backend/uploads/resumes
    disk:
      name: resume-storage
      mountPath: /opt/render/project/src/backend/uploads/resumes
      sizeGB: 1

databases:
  - name: placement-db
    plan: free
