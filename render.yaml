services:
  - type: web
    name: placement-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: placement-db
          property: connectionString
      - key: PORT
        value: 10000

databases:
  - name: placement-db
    plan: free
